name: mcp-server-ci

on:
  push:
    paths:
      - "mcp-server/**"
      - "install.sh"
      - "commands/**"
      - "agents/**"
      - "skills/**"
      - "README.md"
      - "TROUBLESHOOT.md"
      - "CHANGELOG.md"
      - "CLAUDE.md"
      - "WINDOWS_FIXES.md"
      - "update.bat"
      - ".github/workflows/mcp-server-ci.yml"
  pull_request:
    paths:
      - "mcp-server/**"
      - "install.sh"
      - "commands/**"
      - "agents/**"
      - "skills/**"
      - "README.md"
      - "TROUBLESHOOT.md"
      - "CHANGELOG.md"
      - "CLAUDE.md"
      - "WINDOWS_FIXES.md"
      - "update.bat"
      - ".github/workflows/mcp-server-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp-server
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: mcp-server/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run selftest
      - run: node auth-setup.js --status --config "$RUNNER_TEMP/claude.json"
      - run: npm audit --omit=dev

  release-surface-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - run: node --check mcp-server/auth-setup.js
      - run: bash -n install.sh
      - run: |
          if grep -R "git add -A" commands/update-omo.md update.bat; then
            echo "Broad git staging is not allowed in update automation"
            exit 1
          fi
      - run: |
          node -e "const p=require('./mcp-server/providers.json'); const a=p.providers.gpt.auth; if (a.auth_priority.includes('chatgpt_oauth')) { throw new Error('chatgpt_oauth must not be in default auth_priority'); }"
      - run: node mcp-server/auth-setup.js --status --config "$RUNNER_TEMP/claude.json"
